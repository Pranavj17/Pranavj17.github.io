title: Pranav J — Engineering Notes
description: Production AI infrastructure, LLM benchmarks, observability engineering.
author: Pranav J
email: pranav.j@scripbox.com
url: "https://pranavj17.github.io"
baseurl: ""

theme: minima
markdown: kramdown

# Disable Rouge syntax highlighting wrappers — keep code blocks as plain
# <pre><code class="language-X">...</code></pre> so Medium's import handles them cleanly.
kramdown:
  input: GFM
  syntax_highlighter: ~
  hard_wrap: false

permalink: /:year/:month/:day/:title/

minima:
  social_links:
    github: Pranavj17
    linkedin: pranav-j

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Pranav J"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
